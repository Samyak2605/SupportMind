services:
  - type: web
    name: supportmind
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPPORTMIND_CONFIG_PATH
        value: config/supportmind.yaml
