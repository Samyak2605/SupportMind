app:
  name: SupportMind
  environment: development
  log_level: INFO

paths:
  raw_data: data/raw/bitext_support.csv
  processed_chunks: data/processed/chunks.jsonl
  evaluation_dataset: data/processed/eval_dataset.jsonl
  vectorstore_dir: data/vectorstore/supportmind

models:
  embedding_model: BAAI/bge-small-en-v1.5
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  llm_model: llama-3.1-8b-instant

chunking:
  chunk_size: 300
  chunk_overlap: 50

retrieval:
  semantic_top_k: 12
  bm25_top_k: 12
  final_top_k: 6
  rerank_top_k: 8
  rrf_k: 60

generation:
  temperature: 0.1
  max_tokens: 700
  request_timeout_seconds: 45

evaluation:
  sample_size: 40
  random_seed: 42
