app:
  name: SupportMind
  environment: development
  log_level: INFO

paths:
  raw_data: data/raw/bitext_support.csv
  processed_chunks: data/processed/chunks.jsonl
  evaluation_dataset: data/processed/eval_dataset.jsonl
  vectorstore_dir: data/vectorstore/supportmind
  orders_db: data/orders.db
  checkpoints_db: data/checkpoints.db
  llm_cache: data/llm_cache.json

models:
  embedding_model: BAAI/bge-small-en-v1.5
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  llm_model: llama-3.1-8b-instant

chunking:
  chunk_size: 300
  chunk_overlap: 50

retrieval:
  semantic_top_k: 12
  bm25_top_k: 12
  final_top_k: 6
  rerank_top_k: 8
  rrf_k: 60

generation:
  temperature: 0.1
  max_tokens: 700
  request_timeout_seconds: 45

evaluation:
  sample_size: 30
  random_seed: 42

orders_seed:
  customer_count: 50
  order_count: 200
  failure_injection_rate: 0.05
  random_seed: 7

agent:
  brain_model: llama-3.3-70b-versatile
  fallback_model: gemini-flash-lite-latest
  max_tool_iterations: 4
  refund_approval_cap: 200.0
  approval_timeout_hours: 24
  max_consecutive_failures: 2
